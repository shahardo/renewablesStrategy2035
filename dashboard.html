function p(a,b){return b?Math.round((a/b)*100):0;}

function kcard(label,val,sub,fill,pct){
  var bar=pct!=null?'<div class="kpbar"><div class="kpfill" style="width:'+pct+'%;background:'+fill+'"></div></div>':'';
  return '<div class="kcard"><div class="klabel">'+label+'</div><div class="kval">'+val+'</div><div class="ksub">'+sub+'</div>'+bar+'</div>';
}

function dotStrip(acts){
  return acts.map(function(a){
    var c=a.s==='done'?'#639922':a.s==='progress'?'#378ADD':a.s==='early'?'#BA7517':'var(--color-border-tertiary)';
    return '<div style="height:5px;flex:1;border-radius:2px;background:'+c+'"></div>';
  }).join('');
}

  html+='<div class="sec-hdr">מסלול קיבולת לעמידה ביעד 26 GW ב-2035</div>';
  cd.forEach(function(r){
    var iw=Math.round((r.i/mx)*100);

    var tw=Math.round((r.t/mx)*100);
    html+='<div class="caprow"><div class="caplabel">'+r.l+'</div>';
    html+='<div class="captrack">';
    html+='<div style="position:absolute;top:0;left:0;width:'+iw+'%;height:100%;background:'+r.fi+'"></div>';
    html+='<div style="position:absolute;top:0;left:'+iw+'%;width:'+cw+'%;height:100%;background:'+r.fc+'"></div>';
    html+='<div style="position:absolute;top:0;left:'+tw+'%;width:1.5px;height:100%;background:rgba(0,0,0,0.2)"></div>';
    html+='</div>';
    html+='<div class="capval">'+r.i+' / '+r.t+' GW</div></div>';
  });
  html+='<div class="leg"><div class="legitem"><div class="legsq" style="background:#639922"></div>מותקן</div><div class="legitem"><div class="legsq" style="background:#9FE1CB"></div>בהקמה</div><div class="legitem"><div class="legsq" style="background:var(--color-background-secondary)"></div>נדרש נוסף</div><div class="legitem"><div style="width:1.5px;height:10px;background:rgba(0,0,0,0.25)"></div>יעד 2035</div></div>';
  html+='</div>';

  html+='<div class="sec-hdr">6 מהלכי-על — לחץ לפרטים ולמעקב מעמיק</div>';
  html+='<div class="igrid">';
  INI.forEach(function(ini){
    var tot=ini.acts.length;
    var avg=Math.round(ini.acts.reduce(function(s,a){return s+a.p;},0)/tot);

      ?'<div style="font-size:19px;font-weight:500;color:var(--color-text-primary)">'+ini.gwI+' <span style="font-size:11px;color:var(--color-text-secondary)">/ '+ini.gwT+' GW</span></div>'

function renderDetail(id){
  var ini=null;
  for(var i=0;i<INI.length;i++){if(INI[i].id===id){ini=INI[i];break;}}
  var done=0,prog=0,wait=0;
  ini.acts.forEach(function(a){if(a.s==='done')done++;else if(a.s==='progress')prog++;else wait++;});

  var html='<button class="back" onclick="go(\'overview\')"><i class="ti ti-arrow-right" aria-hidden="true"></i> חזרה למבט כולל</button>';
  html+='<div class="dhead"><div class="dico" style="background:'+ini.bg+'"><i class="ti '+ini.icon+'" style="font-size:22px;color:'+ini.txt+'" aria-hidden="true"></i></div><div><div class="dtitle">'+ini.title+'</div><div class="dsub">'+ini.sub+'</div></div></div>';

  if(ini.gwT){
    var pI=p(ini.gwI||0,ini.gwT);
    var pIC=p((ini.gwI||0)+(ini.gwC||0),ini.gwT);
    html+='<div class="dkgrid">';
    html+=kcard('מותקן',(ini.gwI||0)+' GW',pI+'% מהיעד',ini.fill,pI);
    html+=kcard('בהקמה',(ini.gwC||0)+' GW','מצטבר: '+pIC+'%',ini.fill,null);
    html+=kcard('יעד 2035',ini.gwT+' GW','הספק כולל ב-2035',ini.fill,null);
    html+=kcard('נדרש עוד',ini.gwA+' GW',(100-pIC)+'% מהיעד',ini.fill,null);
    html+='</div>';
  } else if(ini.kpis){
    html+='<div class="dkgrid">';
    ini.kpis.forEach(function(k){html+=kcard(k.l,k.v,k.s,'#888780',null);});
    html+='</div>';
  }

  html+='<div class="two-col">';

  html+='<div><div class="sec-hdr">'+done+' הושלמו · '+prog+' בביצוע · '+wait+' ממתינים</div><div class="alist">';
  ini.acts.forEach(function(a){
    var sc=ST[a.s];
    var imap={done:'ti-check',progress:'ti-player-play',early:'ti-clock',none:'ti-circle'};
    html+='<div class="aitem" style="border-right:3px solid '+sc.fill+'">';
    html+='<div class="arow"><div class="adic" style="background:'+sc.bg+'"><i class="ti '+imap[a.s]+'" style="font-size:10px;color:'+sc.text+'" aria-hidden="true"></i></div>';
    html+='<div class="atitle">'+a.t+'</div>';
    html+='<div class="atag" style="background:'+sc.bg+';color:'+sc.text+'">'+sc.label+'</div></div>';
    html+='<div class="apbar"><div class="aptrack"><div class="apfill" style="width:'+a.p+'%;background:'+sc.fill+'"></div></div><div class="apval">'+a.p+'%</div></div>';
    html+='</div>';
  });
  html+='</div></div>';

  html+='<div>';
  html+='<div class="sec-hdr">ציר אבני דרך</div>';
  html+='<div class="tl"><div class="tl-line"></div><div class="tl-items">';
  ini.ms.forEach(function(m){
    var dc=m.d?ini.fill:'var(--color-background-primary)';
    var bc=m.d?ini.fill:'var(--color-border-secondary)';
    var yc=m.d?'var(--color-text-primary)':'var(--color-text-tertiary)';
    var lc=m.d?'var(--color-text-secondary)':'var(--color-text-tertiary)';
    html+='<div class="tlitem"><div class="tlyear" style="color:'+yc+'">'+m.y+'</div><div class="tldot" style="background:'+dc+';border-color:'+bc+'"></div><div class="tllabel" style="color:'+lc+'">'+m.l+'</div></div>';
  });
  html+='</div></div>';

  html+='<div style="margin-top:16px"><div class="sec-hdr">פילוח צעדי מדיניות</div>';
  ['done','progress','early','none'].forEach(function(s){
    var cnt=ini.acts.filter(function(a){return a.s===s;}).length;
    var sc=ST[s];
    var w=Math.round((cnt/ini.acts.length)*100);
    html+='<div class="sbrow"><div class="sblabel">'+sc.label+'</div><div class="sbtrack"><div class="sbfill" style="width:'+w+'%;background:'+sc.fill+'"></div></div><div class="sbval">'+cnt+'</div></div>';
  });
  html+='</div>';
  html+='</div>';

  html+='</div>';
  return html;
}

function go(v){
  document.getElementById('db').innerHTML=v==='overview'?renderOverview():renderDetail(v);
}
go('overview');
